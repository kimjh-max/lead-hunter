<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Hunter - {% block title %}대시보드{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        .sidebar { background: #1e293b; min-height: 100vh; width: 260px; position: fixed; }
        .main-content { margin-left: 260px; padding: 24px; }
        .card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
        .card:hover { border-color: #6366f1; }
        .stat-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
        .btn-primary:hover { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .status-new { color: #60a5fa; }
        .status-contacted { color: #fbbf24; }
        .status-interested { color: #34d399; }
        .status-replied { color: #a78bfa; }
        .nav-link { color: #94a3b8; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-radius: 8px; margin: 4px 12px; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: #334155; color: #e2e8f0; }
        .badge { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    </style>
</head>
<body>
    <!-- 사이드바 -->
    <div class="sidebar">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                <span>🎯</span> Lead Hunter
            </h1>
            <p class="text-xs text-gray-400 mt-1">by EpicStage</p>
        </div>
        <nav class="mt-4">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                <i class="fas fa-chart-pie w-5"></i> 대시보드
            </a>
            <a href="/leads" class="nav-link {% if '/leads' in request.url.path %}active{% endif %}">
                <i class="fas fa-users w-5"></i> 리드 관리
            </a>
            <a href="/organizations" class="nav-link {% if '/organizations' in request.url.path %}active{% endif %}">
                <i class="fas fa-building w-5"></i> 기관 목록
            </a>
            <a href="/events" class="nav-link {% if '/events' in request.url.path %}active{% endif %}">
                <i class="fas fa-calendar-alt w-5"></i> 행사 목록
            </a>

            <div class="border-t border-gray-700 my-4 mx-4"></div>
            <p class="px-6 text-xs text-gray-500 uppercase tracking-wider mb-2">액션</p>

            <button onclick="runCrawl()" class="nav-link w-full text-left" id="btn-crawl">
                <i class="fas fa-spider w-5"></i> 크롤링 실행
            </button>
            <button onclick="openCampaignModal()" class="nav-link w-full text-left">
                <i class="fas fa-paper-plane w-5"></i> 메일 캠페인
            </button>

            <div class="border-t border-gray-700 my-4 mx-4"></div>
            <p class="px-6 text-xs text-gray-500 uppercase tracking-wider mb-2">상품</p>

            <div class="px-6 space-y-2">
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <span class="w-2 h-2 rounded-full bg-pink-500"></span> 밋업 매칭
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span> 키비주얼 생성
                </div>
            </div>
        </nav>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- 캠페인 모달 -->
    <div id="campaign-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="card p-6 w-96">
            <h3 class="text-lg font-bold mb-4">📧 콜드메일 캠페인 발송</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">상품 선택</label>
                    <select id="campaign-product" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white">
                        <option value="meetup-matcher">밋업 매칭 프로그램</option>
                        <option value="key-visual">키비주얼 생성 프로그램</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">최대 발송 수</label>
                    <input type="number" id="campaign-count" value="10" min="1" max="100"
                           class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white">
                </div>
                <div class="flex gap-2">
                    <button onclick="sendCampaign()" class="btn-primary px-4 py-2 rounded-lg text-white font-medium flex-1">
                        발송 시작
                    </button>
                    <button onclick="closeCampaignModal()" class="bg-gray-700 px-4 py-2 rounded-lg text-white">
                        취소
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runCrawl() {
            const btn = document.getElementById('btn-crawl');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin w-5"></i> 크롤링 중...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/crawl', { method: 'POST' });
                const data = await res.json();
                alert(`크롤링 완료!\n기관: ${data.stats.organizations}개\n행사: ${data.stats.events}개`);
                location.reload();
            } catch (e) {
                alert('크롤링 실패: ' + e.message);
            } finally {
                btn.innerHTML = '<i class="fas fa-spider w-5"></i> 크롤링 실행';
                btn.disabled = false;
            }
        }

        function openCampaignModal() {
            document.getElementById('campaign-modal').classList.remove('hidden');
        }

        function closeCampaignModal() {
            document.getElementById('campaign-modal').classList.add('hidden');
        }

        async function sendCampaign() {
            const product = document.getElementById('campaign-product').value;
            const count = document.getElementById('campaign-count').value;

            try {
                const res = await fetch(`/api/send-campaign?product_slug=${product}&max_count=${count}`, {
                    method: 'POST'
                });
                const data = await res.json();
                alert(`캠페인 완료!\n발송: ${data.stats.sent}건\n실패: ${data.stats.failed}건`);
                closeCampaignModal();
            } catch (e) {
                alert('발송 실패: ' + e.message);
            }
        }
    </script>
</body>
</html>
