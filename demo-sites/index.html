<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpicStage - AI 솔루션</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body { background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 48px; font-weight: 900; margin-bottom: 12px; }
        .subtitle { color: #94a3b8; font-size: 18px; margin-bottom: 60px; }
        .cards { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }
        .card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 48px 40px; width: 380px; text-decoration: none; color: #fff;
            transition: all 0.3s;
        }
        .card:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.3); }
        .card.pink:hover { box-shadow: 0 20px 60px rgba(236, 72, 153, 0.3); border-color: #ec4899; }
        .card.blue:hover { box-shadow: 0 20px 60px rgba(59, 130, 246, 0.3); border-color: #3b82f6; }
        .card .icon { font-size: 56px; margin-bottom: 20px; }
        .card h2 { font-size: 24px; margin-bottom: 12px; }
        .card p { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        .card .btn {
            display: inline-block; padding: 12px 28px; border-radius: 12px;
            font-weight: 600; font-size: 15px; transition: all 0.3s;
        }
        .card.pink .btn { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        .card.blue .btn { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
        footer { position: fixed; bottom: 20px; width: 100%; text-align: center; color: #475569; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 EpicStage</h1>
        <p class="subtitle">AI 기반 행사 솔루션</p>
        <div class="cards">
            <a href="./meetup-matcher/" class="card pink">
                <div class="icon">🤝</div>
                <h2>AI 밋업 매칭</h2>
                <p>참가자 프로필을 AI가 분석하여<br>최적의 네트워킹 매칭을 자동 생성합니다</p>
                <span class="btn">데모 체험하기 →</span>
            </a>
            <a href="./key-visual/" class="card blue">
                <div class="icon">🎨</div>
                <h2>AI 키비주얼 생성</h2>
                <p>행사 정보만 입력하면<br>전문 디자이너 수준의 키비주얼을 1분 내 생성</p>
                <span class="btn">데모 체험하기 →</span>
            </a>
        </div>
    </div>
    <footer>© 2026 EpicStage. All rights reserved.</footer>
</body>
</html>
